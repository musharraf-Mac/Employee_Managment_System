<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Monthly Report</title>
    <link rel="stylesheet" href="CSS/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/e_det_rep.css">
    
</head>
<body>
    <div class="details-container">
        <div class="details-wrapper">
            <div class="details-header">
                <h1><i class="fas fa-user-check"></i> Employee Monthly Attendance & Leave</h1>
                <div class="header-buttons">
                    <button class="btn-back" onclick="window.history.back()">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                </div>
            </div>
            <div class="table-container">
                <div class="table-scroll">
                    <table id="monthlyTable">
                        <thead>
                            <tr>
                                <th>E_ID</th>
                                <th>First Name</th>
                                <th>Leave Days (Month)</th>
                                <th>Working Hours (Month)</th>
                                <th>Generate Report</th>
                            </tr>
                        </thead>
                        <tbody id="monthlyList">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 40px;">
                                    <i class="fas fa-spinner fa-spin" style="font-size: 2em; color: #667eea;"></i>
                                    <p>Loading data...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="JS/e_det_rep.js"></script>
</body>
</html>
